<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="manifest" href="manifest.webmanifest">
  <title>Color PickUp</title>
  <link type="text/css" rel="stylesheet" href="index.css">
</head>

<body>
  <header class="header">
    <div class="titleHeader">
      <img src="../icons/48.png" alt="">
      <h1 class="titleHeaderHeading" id="titleHeaderHeading">Color PickUp</h1>
    </div>
    <div class="controlHeader">
      <div class="controlLeft">
        <button class="controlButton" id="clearHistory" title="Clear History">
          <svg>
            <use href="#iconClear"></use>
          </svg>
        </button>
        <button class="controlButton" id="colorPicker" title="Color Picker">
          <svg>
            <use href="#iconColorPicker"></use>
          </svg>
        </button>
        <button class="controlButton" id="eyeDropper" title="Eye Dropper">
          <svg>
            <use href="#iconEyeDropper"></use>
          </svg>
        </button>
        <div class="controlButton" id="tileSize" title="Tile Size (px)">
          <input id="sizeInput" type="number" value="28" min="8" max="128" step="1">
        </div>
      </div>

      <div class="controlRight">
        <button class="toolButton" id="reloadUi" title="Reload UI">
          <svg>
            <use href="#iconReload"></use>
          </svg>
        </button>
        <button class="toolButton" id="themeToggle" title="Dark | Light Mode">
          <svg>
            <use href="#iconTheme"></use>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="pickerWorkspace">
    <div class="colorDisplaySection">
      <div class="colorPreviewContainer">
        <input id="pickerNative" type="color">
      </div>
      <div class="colorDetailsContainer" id="colorDetails">
        <input type="text" value="Loading..." readonly class="colorCodeInput">
        <input type="text" value="Loading..." readonly class="colorCodeInput">
        <input type="text" value="Loading..." readonly class="colorCodeInput">
        <input type="text" value="Loading..." readonly class="colorCodeInput">
        <input type="text" value="Loading..." readonly class="colorCodeInput">
        <input type="text" value="Loading..." readonly class="colorCodeInput">
      </div>
    </div>
  </main>

  <section class="paletteSection">
    <details class="paletteAccordion" index="0">
      <summary class="paletteSummary">User defined</summary>
      <div class="paletteTiles userTiles"></div>
    </details>
    <details class="paletteAccordion" index="1">
      <summary class="paletteSummary">Artistic colors</summary>
      <div class="paletteTiles artisticTiles"></div>
    </details>
    <details class="paletteAccordion" index="2">
      <summary class="paletteSummary">Bluish colors</summary>
      <div class="paletteTiles bluishTiles"></div>
    </details>
    <details class="paletteAccordion" index="3">
      <summary class="paletteSummary">Favorite colors</summary>
      <div class="paletteTiles favoriteTiles"></div>
    </details>
    <details class="paletteAccordion" index="4">
      <summary class="paletteSummary">UI design colors</summary>
      <div class="paletteTiles uiDesignTiles"></div>
    </details>
    <details class="paletteAccordion" index="5">
      <summary class="paletteSummary">Popular colors</summary>
      <div class="paletteTiles popularTiles"></div>
    </details>
    <details class="paletteAccordion" index="6">
      <summary class="paletteSummary">Drawing colors</summary>
      <div class="paletteTiles drawingTiles"></div>
    </details>
    <details class="paletteAccordion" index="7">
      <summary class="paletteSummary">Game colors</summary>
      <div class="paletteTiles gameTiles"></div>
    </details>
    <details class="paletteAccordion" index="8">
      <summary class="paletteSummary">CSS3 colors</summary>
      <div class="paletteTiles css3Tiles"></div>
    </details>
    <details class="paletteAccordion" index="9">
      <summary class="paletteSummary">Material colors</summary>
      <div class="paletteTiles materialTiles"></div>
    </details>
    <details class="paletteAccordion" index="10">
      <summary class="paletteSummary">Rainbow colors</summary>
      <div class="paletteTiles rainbowTiles"></div>
    </details>
    <details class="paletteAccordion" index="11">
      <summary class="paletteSummary">Spectrum colors</summary>
      <div class="paletteTiles spectrumTiles"></div>
    </details>
    <details class="paletteAccordion" index="12">
      <summary class="paletteSummary">Safe set of colors</summary>
      <div class="paletteTiles safeTiles"></div>
    </details>
    <details class="paletteAccordion" index="13">
      <summary class="paletteSummary">Nice Random colors</summary>
      <div class="paletteTiles randomTiles"></div>
    </details>
    <details class="paletteAccordion" index="14">
      <summary class="paletteSummary">Monitor colors</summary>
      <div class="paletteTiles monitorTiles"></div>
    </details>
    <details class="paletteAccordion" index="15">
      <summary class="paletteSummary">Comic colors</summary>
      <div class="paletteTiles comicTiles"></div>
    </details>
    <details class="paletteAccordion" index="16">
      <summary class="paletteSummary">Large set of colors</summary>
      <div class="paletteTiles largeTiles"></div>
    </details>
    <details class="paletteAccordion" index="17">
      <summary class="paletteSummary">Hues colors</summary>
      <div class="paletteTiles huesTiles"></div>
    </details>
  </section>

  <script type="text/javascript" src="pallets/artistic.js"></script>
  <script type="text/javascript" src="pallets/bluish.js"></script>
  <script type="text/javascript" src="pallets/comic.js"></script>
  <script type="text/javascript" src="pallets/css3.js"></script>
  <script type="text/javascript" src="pallets/drawing.js"></script>
  <script type="text/javascript" src="pallets/favorite.js"></script>
  <script type="text/javascript" src="pallets/game.js"></script>
  <script type="text/javascript" src="pallets/hues.js"></script>
  <script type="text/javascript" src="pallets/large.js"></script>
  <script type="text/javascript" src="pallets/material.js"></script>
  <script type="text/javascript" src="pallets/monitor.js"></script>
  <script type="text/javascript" src="pallets/popular.js"></script>
  <script type="text/javascript" src="pallets/rainbow.js"></script>
  <script type="text/javascript" src="pallets/random.js"></script>
  <script type="text/javascript" src="pallets/safe.js"></script>
  <script type="text/javascript" src="pallets/spectrum.js"></script>
  <script type="text/javascript" src="pallets/ui.js"></script>

  <script type="text/javascript" src="pallets/notify.js"></script>
  <script type="text/javascript" src="index.js"></script>
  <script src="toaster.js"></script>
</body>

</html>
