} .icon svg{ width:42px; height:42px; fill:var(--accentColor);} h1{ font-size:2rem; margin-bottom:12px;} p{ color:var(--textColorMuted); line-height:1.7; max-width:500px; margin:auto;} .network-box{ margin-top:28px; padding:14px; background:var(--surfaceColorSecondary); border:1px solid var(--borderColor); border-radius:12px; font-family:var(--fontMono); font-size:13px; color:var(--textColorMuted);} .actions{ margin-top:28px; display:flex; justify-content:center; gap:12px; flex-wrap:wrap;} .btn{ border:none; cursor:pointer; text-decoration:none; height:42px; padding:0 18px; border-radius:10px; font-weight:600; display:flex; align-items:center; justify-content:center; transition:.15s ease;} .btn-primary{ background:var(--accentColor); color:white;} .btn-secondary{ background:var(--surfaceColorSecondary); border:1px solid var(--borderColor); color:var(--textColor);} .btn:hover{ transform:translateY(-1px);} .footer{ border-top:1px solid var(--borderColor); padding:14px; text-align:center; font-size:12px; color:var(--textColorMuted); font-family:var(--fontMono);} .online{ color:var(--successColor);} .offline{ color:#ef4444;} @media(max-width:480px){ h1{ font-size:1.6rem;} .content{ padding:40px 20px;} .actions{ flex-direction:column;} .btn{ width:100%;}}
