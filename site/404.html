<!DOCTYPE html><html lang="en" theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="shortcut icon" href="src/48.png" type="image/x-icon"><title>404 - Page Not Found</title><style>:root{ --bgColor:#ffffff; --surfaceColor:#f9fafb; --surfaceColorSecondary:#f3f4f6; --surfaceColorHover:#e5e7eb; --textColor:#111827; --textColorMuted:#4b5563; --borderColor:#e5e7eb; --accentColor:#3b82f6; --shadowSubtle:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06); --shadowMedium:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -1px rgba(0,0,0,.06); --fontSans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; --fontMono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;} html[theme="dark"]{ --bgColor:#121212; --surfaceColor:#1e1e1e; --surfaceColorSecondary:#272727; --surfaceColorHover:#333333; --textColor:#f9fafb; --textColorMuted:#9ca3af; --borderColor:#2d2d2d;} *{ margin:0; padding:0; box-sizing:border-box;} body{ min-height:100vh; font-family:var(--fontSans); background:var(--bgColor); color:var(--textColor); display:flex; align-items:center; justify-content:center; padding:20px;} .error-card{ width:100%; max-width:650px; background:var(--surfaceColor); border:1px solid var(--borderColor); border-radius:16px; box-shadow:var(--shadowMedium); overflow:hidden;} .card-header{ padding:18px 24px; border-bottom:1px solid var(--borderColor); display:flex; align-items:center; justify-content:space-between;} .logo{ font-size:1.25rem; font-weight:700;} .status{ font-family:var(--fontMono); color:var(--textColorMuted); font-size:12px;} .card-body{ padding:50px 32px; text-align:center;} .error-code{ font-size:6rem; font-weight:800; line-height:1; color:var(--accentColor);} .error-title{ margin-top:16px; font-size:1.8rem; font-weight:700;} .error-description{ margin-top:12px; color:var(--textColorMuted); line-height:1.7; max-width:500px; margin-left:auto; margin-right:auto;} .actions{ margin-top:32px; display:flex; justify-content:center; gap:12px; flex-wrap:wrap;} .btn{ height:42px; padding:0 18px; border-radius:10px; border:1px solid var(--borderColor); background:var(--surfaceColorSecondary); color:var(--textColor); text-decoration:none; display:flex; align-items:center; justify-content:center; transition:.15s ease; font-weight:600;} .btn:hover{ background:var(--surfaceColorHover); transform:translateY(-1px);} .btn-primary{ background:var(--accentColor); border-color:var(--accentColor); color:white;} .btn-primary:hover{ opacity:.92;} .card-footer{ border-top:1px solid var(--borderColor); padding:14px 24px; text-align:center; color:var(--textColorMuted); font-family:var(--fontMono); font-size:12px;} @media(max-width:480px){ .error-code{ font-size:4rem;} .error-title{ font-size:1.4rem;} .card-body{ padding:40px 20px;}}
</style></head><body><div class="error-card"><div class="card-header"><div class="logo">Color PickUp</div><div class="status">ERROR_404</div></div><div class="card-body"><div class="error-code">404</div><h1 class="error-title">Page Not Found </h1><p class="error-description">The page you're looking for doesn't exist, may have been moved, or the URL was entered incorrectly. </p><div class="actions"><a href="./" class="btn btn-primary">Go Home </a><a href="javascript:history.back()" class="btn">Go Back </a></div></div><div class="card-footer">Requested resource could not be located. </div></div></body></html>
